<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot204 - Asistente de información comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Crimson+Pro:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=6">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="app-layout">
        <nav class="app-sidebar">
            <div class="nav-brand">
                <img src="/static/logo/Logo-sin-fondo.png" alt="Logo" class="sidebar-logo">
            </div>
            <div class="nav-items">
                <!-- Iconos removidos por solicitud -->
            </div>
            <div class="nav-footer">
            </div>
        </nav>
        
        <div class="app-wrapper">
            <div class="top-bar">
            <h1 class="app-title">Comunicación Interna</h1>
            <button id="theme-toggle" class="theme-toggle-btn" title="Cambiar tema">
                <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>

        <div class="main-card">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Equipo / Consultas</h2>
                </div>
                <div class="sidebar-list" id="chat-tabs-list">
                    <div class="sidebar-item active">
                        <span class="status-dot online"></span> Nueva Consulta
                    </div>
                </div>
                <div class="sidebar-footer">
                    <button id="new-chat-btn" class="new-chat-btn">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Nueva consulta
                    </button>
                </div>
            </aside>

            <div class="chat-area">
                <header class="chat-header">
                    <div class="chat-tab"># Consultas</div>
                </header>

                <main class="chat-messages" id="chat-messages">
                    <div class="message bot-message">
                        <div class="message-content">
                            ¡Hola! 👋 Soy <b>Bot204</b>, tu asistente de información comercial. ¿En qué te puedo ayudar hoy?
                        </div>
                    </div>
                </main>

                <footer class="chat-input-area">
                    <form id="chat-form">
                        <button type="button" class="attachment-btn" title="Adjuntar archivo">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <input type="text" id="user-input" placeholder="Escribe un mensaje..." autocomplete="off" required>
                        <button type="submit" id="send-button" title="Enviar mensaje">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </footer>
            </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
