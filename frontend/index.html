<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot204 Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glow-bg-blob blob-purple"></div>
    <div class="glow-bg-blob blob-green"></div>
    <div class="glow-bg-blob blob-gold"></div>

    <div class="chat-container">
        <header class="chat-header">
            <h1>Chatbot de Ventas</h1>
            <p>Sistema Inteligente Bot204</p>
        </header>

        <main class="chat-messages" id="chat-messages">
            <!-- Messages will be appended here -->
            <div class="message bot-message">
                <div class="message-content">
                    ¡Hola! Soy el asistente de ventas Bot204. ¿En qué te puedo ayudar hoy?
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off" required>
                <button type="submit" id="send-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
